name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o vulnscan-linux-amd64 ./cmd/
          GOOS=linux GOARCH=arm64 go build -o vulnscan-linux-arm64 ./cmd/
          GOOS=darwin GOARCH=amd64 go build -o vulnscan-darwin-amd64 ./cmd/
          GOOS=darwin GOARCH=arm64 go build -o vulnscan-darwin-arm64 ./cmd/
          GOOS=windows GOARCH=amd64 go build -o vulnscan-windows-amd64.exe ./cmd/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            vulnscan-linux-amd64
            vulnscan-linux-arm64
            vulnscan-darwin-amd64
            vulnscan-darwin-arm64
            vulnscan-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
